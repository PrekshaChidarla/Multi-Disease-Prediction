{% extends 'Base.html' %}
{% load static %}
{% block main %}
<style>
    .inFormBackground {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 40px;
        position: relative;
        z-index: 1;
    }

    /* Floating animated background circles */
    .circle {
        position: absolute;
        border-radius: 50%;
        background: linear-gradient(135deg, #63a8bd, #4f6d7a);
        opacity: 0.15;
        animation: float 12s infinite ease-in-out;
    }
    .circle:nth-child(1) {
        width: 180px;
        height: 180px;
        top: 8%;
        left: 12%;
        animation-delay: 0s;
    }
    .circle:nth-child(2) {
        width: 280px;
        height: 280px;
        bottom: 8%;
        right: 12%;
        animation-delay: 3s;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-25px); }
    }

    /* Form box */
    .inLoginForm {
        padding: 25px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        box-shadow: 0 6px 25px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    label {
        color: #fff;
        font-weight: 500;
        margin-bottom: 6px;
    }

    .form-columns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .inputGroup {
        display: flex;
        flex-direction: column;
    }

    .inputGroup input {
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.85);
        transition: all 0.3s ease;
    }

    .inputGroup input:focus {
        outline: none;
        background: #fff;
        box-shadow: 0 0 10px #63a8bd;
    }

    .roleSelection {
        display: flex;
        align-items: center;
        margin-top: 10px;
        gap: 20px;
        color: #fff;
        font-weight: 500;
    }

    .roleSelection input {
        margin-right: 6px;
        transform: scale(1.1);
        accent-color: #63a8bd;
    }

    .submitForm {
        display: block;
        width: 180px;
        padding: 10px;
        background: linear-gradient(135deg, #63a8bd, #4f6d7a);
        color: #fff;
        font-weight: bold;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: transform 0.3s ease, background 0.3s ease;
        margin: 20px auto 0;
        text-align: center;
    }

    .submitForm:hover {
        transform: scale(1.05);
        background: linear-gradient(135deg, #4f6d7a, #63a8bd);
    }

    /* Responsive */
    @media (max-width: 700px) {
        .form-columns {
            grid-template-columns: 1fr;
        }
        .inLoginForm {
            max-width: 90%;
            padding: 20px;
        }
        .circle {
            display: none;
        }
    }
</style>

<div class="inFormBackground">
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="inLoginForm">
        <form action="" method="post">
            {% csrf_token %}
            {% if messages %}
                {% for message in messages %}
                    <p style="color:yellow; text-align:center;">{{ message }}</p>
                {% endfor %}
            {% endif %}
            <div class="form-columns">
                <div class="inputGroup">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter Name" required>
                </div>
                <div class="inputGroup">
                    <label for="mobile">Mobile</label>
                    <input type="tel" id="mobile" name="mobile" placeholder="Enter Mobile Number" required>
                </div>
                <div class="inputGroup">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter Email" required>
                </div>
                <div class="inputGroup">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter Username" required>
                </div>
                <div class="inputGroup">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter Password" required>
                </div>
                <div class="inputGroup">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="cnfm_password" placeholder="Confirm Password" required>
                </div>
            </div>
            <div class="roleSelection">
                <label><input type="radio" name="role" value="admin"> Admin</label>
                <label><input type="radio" name="role" value="user"> User</label>
            </div>
            <button class="submitForm">Register</button>
        </form>
    </div>
</div>
{% endblock %}
