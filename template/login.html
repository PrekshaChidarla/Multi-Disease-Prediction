{% extends 'Base.html' %}
{% load static %}
{% block main %}
<style>
  /* Background wrapper */
  .inFormBackground {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 80px;
    position: relative;
    z-index: 1;
  }

  /* Floating circles for effect */
  .circle {
    position: absolute;
    border-radius: 50%;
    background: linear-gradient(135deg, #00ffe7, #ff00d4);
    opacity: 0.15;
    animation: float 10s ease-in-out infinite alternate;
    z-index: 0;
  }

  .circle:nth-child(1) {
    width: 180px;
    height: 180px;
    top: 8%;
    left: 12%;
  }

  .circle:nth-child(2) {
    width: 260px;
    height: 260px;
    bottom: 12%;
    right: 12%;
    animation-delay: 3s;
  }

  /* Form card */
  .inLoginForm {
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(18px);
    border-radius: 16px;
    padding: 30px 40px;
    width: 100%;
    max-width: 380px; /* medium size */
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
    z-index: 2;
    animation: fadeInUp 1.2s ease;
  }

  /* Input group */
  .inputGroup {
    display: flex;
    flex-direction: column;
    margin-bottom: 20px;
  }

  .inputGroup label {
    color: #fff;
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 14px;
  }

  .inputGroup input {
    padding: 12px;
    border: 1px solid #555;
    border-radius: 8px;
    outline: none;
    background: rgba(0, 0, 0, 0.3);
    color: #fff;
    transition: all 0.3s ease;
  }

  .inputGroup input:focus {
    border-color: #00ffe7;
    box-shadow: 0 0 8px #00ffe7;
    transform: scale(1.02);
  }

  /* Submit button */
  .submitForm {
    display: block;
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #00ffe7, #ff00d4);
    border: none;
    border-radius: 30px;
    color: #111;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.4s ease;
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .submitForm:hover {
    background: linear-gradient(270deg, #ff00d4, #00ffe7);
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 0 15px rgba(0, 255, 231, 0.6);
  }

  /* Animations */
  @keyframes float {
    from { transform: translateY(0px); }
    to { transform: translateY(30px); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(50px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 600px) {
    .inLoginForm {
      max-width: 280px;
      padding: 20px;
    }
    .circle {
      display: none;
    }
  }
</style>

<div class="inFormBackground">
  <div class="circle"></div>
  <div class="circle"></div>

  <div class="inLoginForm">
    <form action="" method="post">
      {% csrf_token %}
      {% if messages %}
        {% for message in messages %}
          <p style="color: #ff8080; font-size: 14px;">{{ message }}</p>
        {% endfor %}
      {% endif %}

      <div class="inputGroup">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter Username" required>
      </div>

      <div class="inputGroup">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter Password" required>
      </div>

      <button class="submitForm">Login</button>
    </form>
  </div>
</div>
{% endblock %}
